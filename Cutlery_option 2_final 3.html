<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Famous Dave's - Order</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Smooth transitions for heights */
    #essentials-granular {
      transition-property: max-height, opacity, border-color;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 300ms;
    }
  </style>
</head>
<body class="flex flex-col h-screen bg-gray-50 font-sans text-gray-800 overflow-hidden">

  <!-- Top Navigation Bar -->
  <header class="flex items-center justify-between px-6 py-3 bg-[#0c4a2a] text-white">
    <div class="flex items-center space-x-8">
      <div class="flex items-center space-x-2 cursor-pointer">
        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-[#0c4a2a] font-bold text-xs leading-none text-center p-1 border-2 border-dashed border-[#0c4a2a]">
          Famous<br/>Dave's
        </div>
        <span class="font-bold text-xl tracking-tight hidden sm:block">Famous Dave's</span>
      </div>
      
      <div class="bg-[#08351e] rounded-full p-1 flex">
        <button class="px-6 py-2 rounded-full text-sm font-medium hover:bg-[#0c4a2a] transition-colors">Ordering</button>
        <button class="px-6 py-2 rounded-full text-sm font-medium bg-[#facc15] text-gray-900 shadow-sm">Catering</button>
      </div>
    </div>

    <div class="flex items-center space-x-6">
      <div class="flex items-center space-x-3 text-sm">
        <div class="bg-[#facc15] p-2 rounded-full text-gray-900">
          <i data-lucide="map-pin" class="w-4 h-4"></i>
        </div>
        <div>
          <div class="font-bold flex items-center gap-1">
            Pick Up <span class="text-[#facc15] text-xs font-normal">Scheduled</span>
          </div>
          <div class="text-gray-300 text-xs">Triq It - Trunciera</div>
        </div>
      </div>
      <button class="bg-white text-[#0c4a2a] font-semibold px-6 py-2.5 rounded-full hover:bg-gray-100 transition-colors shadow-sm">
        Sign In
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <div class="flex flex-1 overflow-hidden">
    
    <!-- Left Column - Menu -->
    <div class="flex-1 flex flex-col bg-white overflow-hidden">
      
      <!-- Sub Navigation -->
      <div class="flex items-center px-6 py-4 border-b border-gray-200 shrink-0">
        <button class="p-1 bg-[#0c4a2a] text-white rounded-full mr-4 hover:bg-[#08351e]">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <div class="flex-1 overflow-x-auto no-scrollbar">
          <ul class="flex space-x-8 text-sm font-semibold text-gray-500 whitespace-nowrap">
            <li class="cursor-pointer hover:text-gray-900">Meat and Side Dish Kits</li>
            <li class="cursor-pointer hover:text-gray-900">Homemade Side Dishes</li>
            <li class="cursor-pointer hover:text-gray-900">Homemade Desserts</li>
            <li class="cursor-pointer text-gray-900 border-b-2 border-[#0c4a2a] pb-1">Beverages</li>
            <li class="cursor-pointer hover:text-gray-900">Vegetarian Meals</li>
            <li class="cursor-pointer hover:text-gray-900">Popular Tacos Deal</li>
          </ul>
        </div>
        <button class="ml-4 p-2 border border-gray-300 rounded-full text-gray-500 hover:bg-gray-50">
          <i data-lucide="search" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Menu Grid -->
      <div class="flex-1 overflow-y-auto p-6 bg-gray-50/50">
        <h1 class="text-2xl font-bold mb-6 text-gray-900">Beverages</h1>
        <div id="menu-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
          <!-- Menu items dynamically injected here -->
        </div>
      </div>
    </div>

    <!-- Right Column - Cart & Catering Checkout -->
    <div class="w-[400px] shrink-0 bg-white border-l border-gray-200 flex flex-col shadow-2xl z-10 relative">
      
      <div class="p-5 border-b border-gray-100 flex justify-between items-end shrink-0">
        <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Your Cart</h2>
        <button onclick="clearCart()" class="text-sm font-semibold text-[#0c4a2a] hover:underline mb-1">Clear All</button>
      </div>

      <div class="flex-1 overflow-y-auto bg-gray-50/30 p-5 space-y-4">
          
        <!-- Guest Count Card -->
        <div class="bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
          <div class="flex items-center gap-3">
            <div class="bg-gray-100 p-2 rounded-full text-gray-600">
              <i data-lucide="user" class="w-[18px] h-[18px]"></i>
            </div>
            <span class="font-semibold text-gray-800">Guest Count</span>
          </div>
          <div class="flex items-center bg-gray-100 rounded-lg p-1 border border-gray-200">
            <button onclick="updateGuestCount(-1)" class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-white rounded-md transition-all shadow-sm"><i data-lucide="minus" class="w-4 h-4"></i></button>
            <span id="guest-count-display" class="w-10 text-center font-bold text-gray-900">9</span>
            <button onclick="updateGuestCount(1)" class="w-8 h-8 flex items-center justify-center bg-[#facc15] text-gray-900 hover:bg-yellow-500 rounded-md transition-all shadow-sm"><i data-lucide="plus" class="w-4 h-4"></i></button>
          </div>
        </div>

        <!-- Dining Essentials Section -->
        <div id="essentials-card" class="rounded-xl border transition-all duration-300 overflow-hidden shadow-sm border-gray-200 bg-white">
          
          <!-- Header / Toggle -->
          <div class="p-4 flex items-center justify-between cursor-pointer" onclick="toggleWantsEssentials()">
            <div class="flex items-start gap-3">
              <div id="essentials-icon-bg" class="p-2 rounded-full mt-0.5 transition-colors bg-gray-100 text-gray-500">
                <i data-lucide="leaf" class="w-[18px] h-[18px]"></i>
              </div>
              <div>
                <h3 class="font-semibold text-gray-900 leading-tight">Tableware</h3>
                <p id="essentials-desc" class="text-xs mt-1 transition-colors text-gray-500">
                  Thanks for reducing waste.
                </p>
              </div>
            </div>
            
            <!-- Modern Toggle Switch -->
            <button 
              id="essentials-toggle-btn"
              class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-gray-200"
              role="switch"
            >
              <span 
                id="essentials-toggle-dot"
                class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0" 
              ></span>
            </button>
          </div>

          <!-- Expanded Options -->
          <div id="essentials-granular" class="max-h-0 opacity-0 overflow-hidden border-t-transparent transition-all duration-300 ease-in-out">
            <div class="p-4 pt-3 space-y-3 bg-white/50">
              
              <!-- Option 1: Individual Kits -->
              <label class="flex items-start gap-3 cursor-pointer group">
                <div class="relative flex items-start pt-0.5">
                  <input 
                    type="checkbox" 
                    class="w-5 h-5 rounded border-gray-300 accent-[#0c4a2a] cursor-pointer" 
                    id="cb-dining-kits"
                    onchange="setIncludeDiningKits(this.checked)"
                    checked
                  />
                </div>
                <div class="flex-1">
                  <span class="text-sm font-semibold text-gray-800 block">Individual Dining Kits</span>
                  <span class="text-xs text-gray-500 block mt-0.5">Plates, forks, knives, and napkins.</span>
                  <div id="dining-kits-badge" class="mt-2 inline-flex items-center gap-1.5 px-2 py-1 bg-green-100 text-green-800 text-[11px] font-bold rounded-md border border-green-200">
                    <i data-lucide="utensils" class="w-2.5 h-2.5"></i>
                    Includes <span id="kits-guest-count">9</span> sets (matches guest count)
                  </div>
                </div>
              </label>

              <!-- Option 2: Serving Utensils -->
              <label class="flex items-start gap-3 cursor-pointer group pt-2 border-t border-green-100/50">
                <div class="relative flex items-start pt-0.5">
                  <input 
                    type="checkbox" 
                    class="w-5 h-5 rounded border-gray-300 accent-[#0c4a2a] cursor-pointer" 
                    id="cb-serving-utensils"
                    onchange="setIncludeServingUtensils(this.checked)"
                    checked
                  />
                </div>
                <div class="flex-1">
                  <span class="text-sm font-semibold text-gray-800 block">Serving Utensils</span>
                  <span class="text-xs text-gray-500 block mt-0.5">Tongs and large serving spoons for trays.</span>
                </div>
              </label>

              <!-- Option 3: Special Instructions -->
              <div class="pt-3 mt-1 border-t border-green-100/50">
                <button type="button" onclick="toggleSpecialInstructions()" id="add-instructions-btn" class="flex items-center gap-1.5 hover:opacity-80 transition-opacity">
                  <span id="add-instructions-icon">
                    <i data-lucide="circle-plus" class="w-[18px] h-[18px] text-black"></i>
                  </span>
                  <span class="text-[#0056b3] font-semibold text-sm underline underline-offset-2 decoration-[#0056b3]">Add special instructions</span>
                </button>
                <div id="special-instructions-container" class="hidden mt-3 pl-6">
                  <textarea 
                    id="special-instructions"
                    placeholder="e.g., extra napkins, please..."
                    class="w-full text-xs p-2.5 rounded-lg border border-gray-200 focus:border-[#0c4a2a] focus:ring-1 focus:ring-[#0c4a2a] outline-none transition-all resize-none h-14 bg-gray-50 text-gray-800 placeholder-gray-400 shadow-sm"
                    onchange="state.specialInstructions = this.value"
                  ></textarea>
                </div>
              </div>

            </div>
          </div>
        </div>
        
        <div class="border-t border-gray-200 my-2"></div>

        <!-- Cart Items List -->
        <div id="cart-list" class="space-y-3 pb-6">
          <!-- Cart items dynamically injected here -->
        </div>

      </div>

      <!-- Sticky Checkout Footer -->
      <div class="p-5 bg-white border-t border-gray-200 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] shrink-0">
        <div class="flex justify-between items-center mb-4 text-sm font-semibold text-gray-600 px-1">
          <span>Subtotal</span>
          <span id="cart-subtotal-text">$ 0.00</span>
        </div>
        
        <button class="w-full bg-[#facc15] hover:bg-yellow-500 text-gray-900 font-bold py-4 rounded-xl flex items-center justify-between px-6 transition-colors shadow-sm text-lg">
          <div class="flex items-center gap-2">
            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            <span id="cart-items-count">0 Items</span>
          </div>
          <div class="flex items-center gap-4">
            <span id="cart-total-text">$ 0.00</span>
            <span class="font-extrabold flex items-center gap-1">Checkout <i data-lucide="chevron-left" class="w-5 h-5 rotate-180"></i></span>
          </div>
        </button>
      </div>
      
    </div>
  </div>
    <script>
    // --- State Management ---
    const state = {
      guestCount: 9,
      wantsEssentials: false,
      includeDiningKits: true,
      includeServingUtensils: true,
      specialInstructions: '',
      cart: [
        { id: 'c1', name: "Dave's Sassy BBQ Salad", serves: 'Serves 12 people', mods: 'Caesar, BBQ Chips Pepsi', price: 64.85, qty: 1 },
        { id: 'c2', name: "Lemonade!!", price: 19.50, qty: 1 },
        { id: 'c3', name: "Sweet Tea", price: 19.50, qty: 1 },
      ],
      menuItems: [
        { id: 'm1', name: 'Lemonade!!', cals: '15.99 Cal', desc: 'Served chilled or over ice, it perfectly balances a sharp, tart citrus bite with sugary sweetness, making it a timeless favorite for hot weather', price: 19.50, hasQty: true, image: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=200&q=80' },
        { id: 'm2', name: 'Iced Tea', cals: '1 gallon', desc: '', price: 19.50, hasQty: false, image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&w=200&q=80' },
        { id: 'm3', name: 'Sweet Tea', cals: '1 gallon', desc: '', price: 19.50, hasQty: true, image: 'https://images.unsplash.com/photo-1499638673689-79a0b5115d87?auto=format&fit=crop&w=200&q=80' },
        { id: 'm4', name: 'Bottled Water', cals: '16 oz bottle', desc: '', price: 2.60, hasQty: false, image: 'https://images.unsplash.com/photo-1523362628745-0c100150b504?auto=format&fit=crop&w=200&q=80' },
        { id: 'm5', name: 'Soda Pop', cals: '', desc: '', price: 2.60, hasQty: false, isCustomizable: true, image: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=200&q=80' },
      ]
    };

    // --- Action Functions ---
    window.updateGuestCount = (delta) => {
      state.guestCount = Math.max(1, state.guestCount + delta);
      document.getElementById('guest-count-display').innerText = state.guestCount;
      const kitsCount = document.getElementById('kits-guest-count');
      if (kitsCount) kitsCount.innerText = state.guestCount;
    };

    window.toggleWantsEssentials = () => {
      state.wantsEssentials = !state.wantsEssentials;
      renderEssentialsUI();
    };

    window.setIncludeDiningKits = (val) => {
      state.includeDiningKits = val;
      renderEssentialsUI();
    };

    window.setIncludeServingUtensils = (val) => {
      state.includeServingUtensils = val;
    };

    window.toggleSpecialInstructions = () => {
      const container = document.getElementById('special-instructions-container');
      const iconSpan = document.getElementById('add-instructions-icon');
      
      if (container.classList.contains('hidden')) {
        container.classList.remove('hidden');
        if (iconSpan) iconSpan.innerHTML = '<i data-lucide="circle-minus" class="w-[18px] h-[18px] text-black"></i>';
      } else {
        container.classList.add('hidden');
        if (iconSpan) iconSpan.innerHTML = '<i data-lucide="circle-plus" class="w-[18px] h-[18px] text-black"></i>';
      }
      lucide.createIcons();
    };

    window.updateCartQty = (id, delta) => {
      state.cart = state.cart.map(item => {
        if (item.id === id) {
          const newQty = Math.max(0, item.qty + delta);
          return { ...item, qty: newQty };
        }
        return item;
      }).filter(item => item.qty > 0);
      renderCart();
    };

    window.clearCart = () => {
      state.cart = [];
      renderCart();
    };

    window.addToCartMock = (name, price) => {
      // Basic mock add to cart for the menu items to make them interactive
      const existing = state.cart.find(item => item.name === name);
      if(existing) {
        window.updateCartQty(existing.id, 1);
      } else {
        const newId = 'c' + Date.now();
        state.cart.push({ id: newId, name: name, price: price, qty: 1 });
        renderCart();
      }
    };

    // --- Render Functions ---
    function renderMenu() {
      const container = document.getElementById('menu-grid');
      container.innerHTML = state.menuItems.map(item => `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 flex justify-between shadow-sm hover:shadow-md transition-shadow">
          <div class="flex flex-col justify-between flex-1 pr-4">
            <div>
              <h3 class="font-bold text-gray-900 mb-1">${item.name}</h3>
              ${item.cals ? `<p class="text-xs text-gray-500 mb-2">${item.cals}</p>` : ''}
              ${item.desc ? `<p class="text-sm text-gray-600 line-clamp-2 leading-relaxed">${item.desc}</p>` : ''}
            </div>
            
            <div class="flex items-center justify-between mt-4">
              <span class="font-bold text-lg text-gray-900">$ ${item.price.toFixed(2)}</span>
              
              ${item.hasQty ? `
                <div class="flex items-center bg-gray-100 rounded-lg p-1 border border-gray-200">
                  <button onclick="addToCartMock('${item.name}', ${item.price})" class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-gray-200 rounded-md transition-colors"><i data-lucide="minus" class="w-4 h-4"></i></button>
                  <span class="w-8 text-center font-semibold text-sm">1</span>
                  <button onclick="addToCartMock('${item.name}', ${item.price})" class="w-8 h-8 flex items-center justify-center bg-[#facc15] text-gray-900 hover:bg-yellow-500 rounded-md transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>
                </div>
              ` : `
                <button onclick="addToCartMock('${item.name}', ${item.price})" class="bg-[#facc15] text-gray-900 font-semibold px-5 py-2 rounded-lg hover:bg-yellow-500 transition-colors flex items-center gap-1 shadow-sm">
                  Add <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
              `}
            </div>
          </div>
          
          <div class="w-28 h-36 flex-shrink-0 relative bg-gray-50 rounded-xl overflow-hidden border border-gray-100 flex items-center justify-center">
            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover" />
            ${item.isCustomizable ? `
              <div class="absolute bottom-0 inset-x-0 bg-white/90 backdrop-blur-sm py-1 text-center text-[10px] font-bold border-t border-gray-200">
                Customizable
              </div>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderCart() {
      const container = document.getElementById('cart-list');
      container.innerHTML = state.cart.map(item => `
        <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm relative group">
          <button onclick="updateCartQty('${item.id}', -${item.qty})" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
          <h4 class="font-bold text-gray-900 pr-6 leading-tight">${item.name}</h4>
          ${item.serves ? `<p class="text-xs text-gray-500 mt-1">${item.serves}</p>` : ''}
          ${item.mods ? `<p class="text-xs text-gray-500 mt-0.5">${item.mods}</p>` : ''}
          
          ${item.id === 'c1' ? `
            <button class="mt-2 text-xs font-semibold text-orange-600 bg-orange-50 px-2 py-1 rounded-md border border-orange-100 inline-flex items-center gap-1">
              <i data-lucide="plus" class="w-3 h-3"></i> Customize
            </button>
          ` : ''}

          <div class="flex items-center justify-between mt-4">
            <span class="font-bold text-gray-900">$ ${(item.price * item.qty).toFixed(2)}</span>
            <div class="flex items-center bg-gray-100 rounded-lg p-1 border border-gray-200">
              <button onclick="updateCartQty('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center text-gray-600 hover:bg-white rounded-md transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
              <span class="w-8 text-center font-bold text-sm text-gray-900">${item.qty}</span>
              <button onclick="updateCartQty('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center bg-[#facc15] text-gray-900 hover:bg-yellow-500 rounded-md transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        </div>
      `).join('');

      // Update Subtotals
      const subtotal = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const itemsCount = state.cart.reduce((sum, item) => sum + item.qty, 0);
      
      const formattedTotal = `$ ${subtotal.toFixed(2)}`;
      document.getElementById('cart-subtotal-text').innerText = formattedTotal;
      document.getElementById('cart-total-text').innerText = formattedTotal;
      document.getElementById('cart-items-count').innerText = `${itemsCount} Items`;

      lucide.createIcons();
    }

    function renderEssentialsUI() {
      const card = document.getElementById('essentials-card');
      const iconBg = document.getElementById('essentials-icon-bg');
      const desc = document.getElementById('essentials-desc');
      const toggleBtn = document.getElementById('essentials-toggle-btn');
      const toggleDot = document.getElementById('essentials-toggle-dot');
      const expanded = document.getElementById('essentials-granular');
      const diningKitsBadge = document.getElementById('dining-kits-badge');

      if (state.wantsEssentials) {
        card.className = "rounded-xl border transition-all duration-300 overflow-hidden shadow-sm border-green-300 bg-green-50/30";
        iconBg.className = "p-2 rounded-full mt-0.5 transition-colors bg-green-100 text-green-700";
        desc.className = "text-xs mt-1 transition-colors text-green-700 font-medium";
        desc.innerText = "Help us reduce waste. Request only what you need.";
        
        toggleBtn.className = "relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-[#0c4a2a]";
        toggleDot.className = "pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-5";

        expanded.className = "max-h-96 opacity-100 border-t border-green-100 transition-all duration-300 ease-in-out";
      } else {
        card.className = "rounded-xl border transition-all duration-300 overflow-hidden shadow-sm border-gray-200 bg-white";
        iconBg.className = "p-2 rounded-full mt-0.5 transition-colors bg-gray-100 text-gray-500";
        desc.className = "text-xs mt-1 transition-colors text-gray-500";
        desc.innerText = "Thanks for reducing waste.";

        toggleBtn.className = "relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-gray-200";
        toggleDot.className = "pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0";

        expanded.className = "max-h-0 opacity-0 overflow-hidden border-t-transparent transition-all duration-300 ease-in-out";
      }

      if (state.includeDiningKits) {
        diningKitsBadge.style.display = 'inline-flex';
      } else {
        diningKitsBadge.style.display = 'none';
      }
    }

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
      renderMenu();
      renderCart();
      renderEssentialsUI();
      lucide.createIcons();
    });
  </script>
</body>
</html>
